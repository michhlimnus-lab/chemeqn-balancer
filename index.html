<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Lab: Balancing Equations</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Import Map for ES Modules in Browser -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // --- External Imports ---
        import { initializeApp, getApps } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, getDocs } from "firebase/firestore";

        // --- React Hooks ---
        const { useState, useEffect, Fragment } = React;

        // --- API Keys & Config ---
        const apiKey = "AIzaSyAJgS2n3Oo4suT_oOyQM-WFphqPb-h-HJk"; // Google Gemini API Key
        const appId = "chem-teaching-learning";

        const firebaseConfig = {   
            apiKey: "AIzaSyA6eCSzw0bY-l8UJAvF0Ja0WATgu9ySakA",
            authDomain: "chem-teaching-learning.firebaseapp.com",
            projectId: "chem-teaching-learning",
            storageBucket: "chem-teaching-learning.firebasestorage.app",
            messagingSenderId: "507016411646",
            appId: "1:507016411646:web:2cd5ca193a11696d64e8af"
        };

        // Initialize Firebase safely (prevents double-initialization errors)
        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Icons ---
        const CheckCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const ArrowRight = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const Lock = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const MessageCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>;
        const Award = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;
        const BookOpen = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const FlaskConical = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 2v7.31"></path><path d="M14 9.3V1.99"></path><path d="M8.5 2h7"></path><path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path><path d="M5.52 16h12.96"></path></svg>;
        const ChevronRight = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const UsersIcon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const ShieldAlert = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

        // --- Lesson Data ---
        const EQUATIONS = [
            { id: 1, title: "Synthesis of Hydrogen Chloride", left: [{ form: "H₂", map: { H: 2 } }, { form: "Cl₂", map: { Cl: 2 } }], right: [{ form: "HCl", map: { H: 1, Cl: 1 } }], target: { left: [1, 1], right: [2] } },
            { id: 2, title: "Forming Water", left: [{ form: "H₂", map: { H: 2 } }, { form: "O₂", map: { O: 2 } }], right: [{ form: "H₂O", map: { H: 2, O: 1 } }], target: { left: [2, 1], right: [2] } },
            { id: 3, title: "Ammonia Production", left: [{ form: "N₂", map: { N: 2 } }, { form: "H₂", map: { H: 2 } }], right: [{ form: "NH₃", map: { N: 1, H: 3 } }], target: { left: [1, 3], right: [2] } },
            { id: 4, title: "Methane Combustion", left: [{ form: "CH₄", map: { C: 1, H: 4 } }, { form: "O₂", map: { O: 2 } }], right: [{ form: "CO₂", map: { C: 1, O: 2 } }, { form: "H₂O", map: { H: 2, O: 1 } }], target: { left: [1, 2], right: [1, 2] } },
            { id: 5, title: "Rusting of Iron", left: [{ form: "Fe", map: { Fe: 1 } }, { form: "O₂", map: { O: 2 } }], right: [{ form: "Fe₂O₃", map: { Fe: 2, O: 3 } }], target: { left: [4, 3], right: [2] } },
            { id: 6, title: "Aluminum & Acid", left: [{ form: "Al", map: { Al: 1 } }, { form: "HCl", map: { H: 1, Cl: 1 } }], right: [{ form: "AlCl₃", map: { Al: 1, Cl: 3 } }, { form: "H₂", map: { H: 2 } }], target: { left: [2, 6], right: [2, 3] } }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('login'); 
            const [eqIndex, setEqIndex] = useState(0);
            const [dbError, setDbError] = useState(null); 
            const [studentName, setStudentName] = useState('');
            
            // Progress State
            const [progress, setProgress] = useState({
                analogy: false,
                rulesRead: false,
                equationsCompleted: [false, false, false, false, false, false],
                exitPassCompleted: false
            });

            // Editor State
            const [coeffs, setCoeffs] = useState({ left: [1, 1], right: [1] });
            const [analogyCoeffs, setAnalogyCoeffs] = useState({ buns: 1, patties: 1, cheese: 1 });
            const [exitPassData, setExitPassData] = useState({ explanation: '', coeffs: { left: [1, 1], right: [1, 1] } });

            // Agent State
            const [currentHint, setCurrentHint] = useState("");
            const [agentLoading, setAgentLoading] = useState(false);
            const [showFeedback, setShowFeedback] = useState(null); 

            // Teacher Vault State
            const [studentAttempts, setStudentAttempts] = useState([]);
            const [teacherLoading, setTeacherLoading] = useState(false);

            // --- Centralized Error Handler ---
            const handleDbError = (error) => {
                console.error("Firebase Details:", error);
                if (error.message && error.message.includes('has not been used')) {
                    setDbError({
                        title: "Firestore API Disabled / Not Created",
                        details: "Please go to the Firebase Console -> Build -> Firestore Database -> 'Create Database'."
                    });
                } else if (error.code === 'permission-denied' || error.message?.includes('Missing or insufficient permissions')) {
                    setDbError({
                        title: "Missing Firestore Permissions (Security Rules)",
                        details: "Your Firebase Security Rules are blocking access.\n\nTo fix this, go to Firebase Console -> Firestore Database -> Rules and replace them with:\n\nrules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /{document=**} {\n      allow read, write: if true;\n    }\n  }\n}"
                    });
                } else if (error.code === 'auth/operation-not-allowed') {
                    setDbError({
                        title: "Anonymous Auth Disabled",
                        details: "Go to Firebase Console -> Authentication -> Sign-in method -> Enable 'Anonymous'."
                    });
                } else {
                    setDbError({ title: "Database Error", details: error.message });
                }
            };

            // --- Auth Initialization ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        handleDbError(error);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);

            // --- Sync Progress to Firebase ---
            useEffect(() => {
                if (!user || !db) return;
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'lesson_progress', 'main');
                
                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // Merge database data securely so properties don't become undefined
                        setProgress(prev => ({
                            ...prev,
                            ...data,
                            equationsCompleted: data.equationsCompleted || prev.equationsCompleted
                        }));

                        if (data.studentName && !studentName) {
                            setStudentName(data.studentName);
                        }
                    }
                }, (error) => {
                    handleDbError(error);
                });

                return () => unsubscribe();
            }, [user]);

            const saveProgress = async (newProgress) => {
                setProgress(newProgress);
                if (!user || !db) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'lesson_progress', 'main');
                    await setDoc(docRef, newProgress, { merge: true });
                } catch (error) {
                    handleDbError(error);
                }
            };

            const handleStartMission = async () => {
                if (!studentName.trim()) return;
                
                // Save name to progress database so it persists
                if (user && db) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'lesson_progress', 'main');
                        await setDoc(docRef, { studentName: studentName.trim() }, { merge: true });
                    } catch (e) {
                        handleDbError(e);
                    }
                }
                
                setActiveTab('analogy');
            };

            // --- Helper Functions ---
            const handleCoeffChange = (side, index, value) => {
                const val = value === '' ? '' : Math.max(1, parseInt(value));
                setCoeffs(prev => {
                const newSide = [...prev[side]];
                newSide[index] = val;
                return { ...prev, [side]: newSide };
                });
            };

            const calculateAtoms = (equation, currentCoeffs) => {
                const leftAtoms = {};
                const rightAtoms = {};
                const elements = new Set();

                equation.left.forEach((reactant, i) => {
                const coeff = currentCoeffs.left[i] === '' ? 1 : currentCoeffs.left[i];
                Object.entries(reactant.map).forEach(([elem, count]) => {
                    leftAtoms[elem] = (leftAtoms[elem] || 0) + (coeff * count);
                    elements.add(elem);
                });
                });

                equation.right.forEach((product, i) => {
                const coeff = currentCoeffs.right[i] === '' ? 1 : currentCoeffs.right[i];
                Object.entries(product.map).forEach(([elem, count]) => {
                    rightAtoms[elem] = (rightAtoms[elem] || 0) + (coeff * count);
                    elements.add(elem);
                });
                });

                return { leftAtoms, rightAtoms, elements: Array.from(elements) };
            };

            // --- AI Agent Logic ---
            const fetchWithRetry = async (url, options, retries = 5) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, delays[i]));
                }
                }
            };

            const getInlineHint = async () => {
                if (!apiKey) {
                    setCurrentHint("API key is missing! Please provide a valid Gemini API key in the code.");
                    return;
                }

                setAgentLoading(true);
                setCurrentHint("");

                const eq = EQUATIONS[eqIndex];
                const { leftAtoms, rightAtoms } = calculateAtoms(eq, coeffs);
                
                let context = `Current Phase: Practice. 
                The student is balancing: ${eq.left.map(l=>l.form).join(' + ')} -> ${eq.right.map(r=>r.form).join(' + ')}
                Current Left Coefficients: ${JSON.stringify(coeffs.left)}. Right Coefficients: ${JSON.stringify(coeffs.right)}.
                Resulting Left Atoms: ${JSON.stringify(leftAtoms)}. Resulting Right Atoms: ${JSON.stringify(rightAtoms)}.`;

                const systemPrompt = `You are an encouraging pedagogical agent helping a student learn to balance chemical equations. 
                Context: ${context}
                Rules: 
                1. Give a short, guiding hint (1-3 sentences max).
                2. DO NOT GIVE THE EXACT NUMBERS OR DIRECT ANSWERS. 
                3. Help them identify which element is currently unbalanced and needs attention next. 
                4. Speak in a friendly, supportive tone.`;

                const payload = {
                contents: [{ role: 'user', parts: [{ text: "Please give me a hint for this equation based on my current inputs." }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                try {
                const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const modelText = result.candidates?.[0]?.content?.parts?.[0]?.text || "I'm having trouble thinking right now. Try again!";
                setCurrentHint(modelText);
                } catch (err) {
                setCurrentHint("Oops, connection error! Check the API key and try again.");
                } finally {
                setAgentLoading(false);
                }
            };

            const logAttempt = async (isCorrect) => {
                if (!user || !db) return;
                try {
                    const eq = EQUATIONS[eqIndex];
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chemistry_attempts'), {
                        userId: user.uid,
                        studentName: studentName || "Anonymous Chemist", // Tag name here
                        equationId: eq.id,
                        equationTitle: eq.title,
                        coeffs: coeffs,
                        isCorrect: isCorrect,
                        timestamp: new Date().toISOString()
                    });
                } catch (error) {
                    handleDbError(error);
                }
            };

            const loadTeacherVault = async () => {
                if (!user || !db) return;
                setTeacherLoading(true);
                try {
                    const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'chemistry_attempts'));
                    const attempts = [];
                    querySnapshot.forEach((doc) => attempts.push({ id: doc.id, ...doc.data() }));
                    attempts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    setStudentAttempts(attempts);
                } catch (error) {
                    handleDbError(error);
                } finally {
                    setTeacherLoading(false);
                }
            };

            // --- Render Sections ---
            const renderLogin = () => (
                <div className="bg-white p-10 rounded-xl shadow-lg border border-slate-200 max-w-md mx-auto mt-10 text-center relative overflow-hidden">
                    <div className="absolute -top-10 -right-10 opacity-10 text-indigo-500">
                        <FlaskConical className="w-48 h-48" />
                    </div>
                    <FlaskConical className="w-16 h-16 text-indigo-600 mx-auto mb-6 relative z-10" />
                    <h2 className="text-3xl font-bold text-slate-800 mb-2 relative z-10">Welcome to ChemLab</h2>
                    <p className="text-slate-600 mb-8 relative z-10">Please enter your name to begin your balancing equations mission.</p>
                    <div className="space-y-4 relative z-10">
                        <input 
                            type="text" 
                            placeholder="Your full name..."
                            className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg transition-all"
                            value={studentName}
                            onChange={(e) => setStudentName(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && studentName.trim() && handleStartMission()}
                        />
                        <button 
                            disabled={!studentName.trim()}
                            onClick={handleStartMission}
                            className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg shadow transition-all duration-200 flex items-center justify-center"
                        >
                            Start Mission <ArrowRight className="w-5 h-5 ml-2" />
                        </button>
                    </div>
                </div>
            );

            const renderAnalogy = () => {
                const isBalanced = analogyCoeffs.buns === 6 && analogyCoeffs.patties === 3 && analogyCoeffs.cheese === 3;
                
                return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 className="text-2xl font-bold text-slate-800 mb-4 flex items-center">
                    <FlaskConical className="mr-2 text-indigo-500 w-6 h-6" /> Part 1: The Burger Equation
                    </h2>
                    <p className="text-slate-600 mb-6 text-lg">
                    Before we balance chemicals, let's balance something delicious. We have a massive order for <strong>3 Double Cheeseburgers</strong>. 
                    A single Double Cheeseburger formula is: <span className="font-mono bg-slate-100 px-2 py-1 rounded">B₂PC</span> (2 Buns, 1 Patty, 1 Cheese).
                    </p>
                    
                    <div className="flex flex-col md:flex-row items-center justify-center gap-6 mb-8 p-6 bg-slate-50 rounded-lg">
                    <div className="flex items-center gap-4">
                        <div className="text-center">
                        <input type="number" min="1" value={analogyCoeffs.buns} onChange={(e) => setAnalogyCoeffs({...analogyCoeffs, buns: Number(e.target.value)})} className="w-16 text-center text-xl font-bold border-2 rounded p-2 mb-2" />
                        <div className="text-4xl">🍞</div>
                        <div className="text-sm font-bold text-slate-500 mt-1">Buns</div>
                        </div>
                        <span className="text-2xl font-bold text-slate-400">+</span>
                        <div className="text-center">
                        <input type="number" min="1" value={analogyCoeffs.patties} onChange={(e) => setAnalogyCoeffs({...analogyCoeffs, patties: Number(e.target.value)})} className="w-16 text-center text-xl font-bold border-2 rounded p-2 mb-2" />
                        <div className="text-4xl">🥩</div>
                        <div className="text-sm font-bold text-slate-500 mt-1">Patties</div>
                        </div>
                        <span className="text-2xl font-bold text-slate-400">+</span>
                        <div className="text-center">
                        <input type="number" min="1" value={analogyCoeffs.cheese} onChange={(e) => setAnalogyCoeffs({...analogyCoeffs, cheese: Number(e.target.value)})} className="w-16 text-center text-xl font-bold border-2 rounded p-2 mb-2" />
                        <div className="text-4xl">🧀</div>
                        <div className="text-sm font-bold text-slate-500 mt-1">Cheese</div>
                        </div>
                    </div>
                    
                    <ArrowRight className="text-indigo-400 w-8 h-8 hidden md:block" />
                    <div className="text-center md:hidden font-bold text-indigo-400">Yields</div>

                    <div className="text-center bg-indigo-50 border-2 border-indigo-200 p-4 rounded-lg">
                        <div className="text-3xl font-bold text-indigo-700 mb-2">3</div>
                        <div className="text-4xl flex justify-center">🍔🍔🍔</div>
                        <div className="text-sm font-bold text-indigo-600 mt-2">Double Cheeseburgers</div>
                    </div>
                    </div>

                    {isBalanced ? (
                    <div className="bg-emerald-50 border border-emerald-200 text-emerald-800 p-4 rounded-lg mb-6 flex items-center justify-between">
                        <div className="flex items-center">
                        <CheckCircle className="mr-2 w-5 h-5" /> Perfect! You've conserved mass. Left side equals the right side!
                        </div>
                        <button onClick={() => {
                        saveProgress({ ...progress, analogy: true });
                        setActiveTab('rules');
                        }} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow transition">
                        Next: The Rules
                        </button>
                    </div>
                    ) : (
                    <div className="bg-amber-50 border border-amber-200 text-amber-800 p-4 rounded-lg mb-6 text-sm">
                        <strong>Hint:</strong> If 1 burger needs 2 buns, how many buns do 3 burgers need? Keep adjusting the numbers until you have enough ingredients!
                    </div>
                    )}
                </div>
                );
            };

            const renderRules = () => (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 className="text-2xl font-bold text-slate-800 mb-4 flex items-center">
                    <BookOpen className="mr-2 text-indigo-500 w-6 h-6" /> Part 2: The Rules of Balancing
                </h2>
                <ul className="space-y-4 mb-8">
                    <li className="flex items-start bg-slate-50 p-4 rounded border-l-4 border-indigo-500">
                    <span className="font-bold text-indigo-600 mr-3">1.</span>
                    <div>
                        <strong>You can ONLY change the coefficients.</strong><br/>
                        Coefficients are the big numbers in front of the molecules (like the <strong className="text-indigo-600">3</strong> in <strong className="text-indigo-600">3</strong>H₂O). These represent how many molecules you have.
                    </div>
                    </li>
                    <li className="flex items-start bg-slate-50 p-4 rounded border-l-4 border-rose-500">
                    <span className="font-bold text-rose-600 mr-3">2.</span>
                    <div>
                        <strong>NEVER change the subscripts.</strong><br/>
                        Subscripts are the small numbers (like the <strong className="text-rose-600">₂</strong> in H<strong className="text-rose-600">₂</strong>O). Changing these changes the actual chemical! (H₂O is water, H₂O₂ is toxic hydrogen peroxide).
                    </div>
                    </li>
                    <li className="flex items-start bg-slate-50 p-4 rounded border-l-4 border-emerald-500">
                    <span className="font-bold text-emerald-600 mr-3">3.</span>
                    <div>
                        <strong>Multiply to count.</strong><br/>
                        To count atoms, multiply the big coefficient by the small subscript. (e.g., <strong>3</strong>H<strong>₂</strong>O means 3 × 2 = 6 Hydrogen atoms).
                    </div>
                    </li>
                </ul>
                <button onClick={() => {
                    saveProgress({ ...progress, rulesRead: true });
                    setActiveTab('practice');
                    setCoeffs({ left: Array(EQUATIONS[0].left.length).fill(1), right: Array(EQUATIONS[0].right.length).fill(1) });
                }} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow transition flex justify-center items-center">
                    Start Training Mission <ChevronRight className="ml-2 w-5 h-5" />
                </button>
                </div>
            );

            const renderPractice = () => {
                const eq = EQUATIONS[eqIndex];
                const { leftAtoms, rightAtoms, elements } = calculateAtoms(eq, coeffs);
                
                const isMathematicallyBalanced = elements.every(el => leftAtoms[el] === rightAtoms[el]);
                const isTargetMatched = JSON.stringify(coeffs.left) === JSON.stringify(eq.target.left) && 
                                        JSON.stringify(coeffs.right) === JSON.stringify(eq.target.right);
                const isPerfect = isMathematicallyBalanced && isTargetMatched;

                const checkAnswer = () => {
                logAttempt(isPerfect);
                setShowFeedback(isPerfect ? 'correct' : 'wrong');
                };

                const handleNextEquation = () => {
                const newProgress = { ...progress };
                newProgress.equationsCompleted[eqIndex] = true;
                saveProgress(newProgress);
                setShowFeedback(null);
                setCurrentHint("");

                if (eqIndex < EQUATIONS.length - 1) {
                    const nextIdx = eqIndex + 1;
                    setEqIndex(nextIdx);
                    setCoeffs({ 
                    left: Array(EQUATIONS[nextIdx].left.length).fill(1), 
                    right: Array(EQUATIONS[nextIdx].right.length).fill(1) 
                    });
                }
                };

                return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-center mb-6">
                    <h2 className="text-xl font-bold text-slate-800">Mission {eqIndex + 1}: {eq.title}</h2>
                    <span className="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-sm font-bold">
                        {eqIndex + 1} / {EQUATIONS.length}
                    </span>
                    </div>

                    <div className="flex flex-wrap items-center justify-center gap-4 py-8 bg-slate-50 rounded-lg mb-8 border border-slate-100">
                    <div className="flex items-center gap-3">
                        {eq.left.map((reactant, i) => (
                        <Fragment key={`l-${i}`}>
                            {i > 0 && <span className="text-2xl font-bold text-slate-400">+</span>}
                            <div className="flex items-center">
                            <input 
                                type="number" min="1" 
                                className={`w-16 text-center text-xl font-bold border-2 rounded p-2 mr-2 ${coeffs.left[i] === '' ? 'border-indigo-300' : 'border-slate-300'}`}
                                value={coeffs.left[i]} 
                                onChange={(e) => handleCoeffChange('left', i, e.target.value)} 
                            />
                            <span className="text-2xl font-bold">{reactant.form}</span>
                            </div>
                        </Fragment>
                        ))}
                    </div>

                    <ArrowRight className="text-indigo-500 w-8 h-8 mx-4" />

                    <div className="flex items-center gap-3">
                        {eq.right.map((product, i) => (
                        <Fragment key={`r-${i}`}>
                            {i > 0 && <span className="text-2xl font-bold text-slate-400">+</span>}
                            <div className="flex items-center">
                            <input 
                                type="number" min="1" 
                                className={`w-16 text-center text-xl font-bold border-2 rounded p-2 mr-2 ${coeffs.right[i] === '' ? 'border-indigo-300' : 'border-slate-300'}`}
                                value={coeffs.right[i]} 
                                onChange={(e) => handleCoeffChange('right', i, e.target.value)} 
                            />
                            <span className="text-2xl font-bold">{product.form}</span>
                            </div>
                        </Fragment>
                        ))}
                    </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div className="border rounded-lg overflow-hidden">
                        <div className="bg-slate-100 px-4 py-2 font-bold text-slate-700 border-b">Reactants (Left)</div>
                        <div className="p-4 space-y-2">
                        {elements.map(el => (
                            <div key={el} className="flex justify-between items-center">
                            <span className="font-bold w-8">{el}:</span>
                            <span className="bg-slate-50 px-3 py-1 rounded border">{leftAtoms[el] || 0}</span>
                            </div>
                        ))}
                        </div>
                    </div>
                    
                    <div className="border rounded-lg overflow-hidden">
                        <div className="bg-slate-100 px-4 py-2 font-bold text-slate-700 border-b">Products (Right)</div>
                        <div className="p-4 space-y-2">
                        {elements.map(el => (
                            <div key={el} className="flex justify-between items-center">
                            <span className="font-bold w-8">{el}:</span>
                            <span className={`px-3 py-1 rounded border font-bold ${leftAtoms[el] === rightAtoms[el] ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-rose-100 text-rose-800 border-rose-200'}`}>
                                {rightAtoms[el] || 0}
                            </span>
                            </div>
                        ))}
                        </div>
                    </div>
                    </div>

                    <div className="flex flex-col gap-4 mb-6">
                    <div className="flex flex-wrap items-center gap-4">
                        <button onClick={checkAnswer} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded shadow transition">
                        Check Answer
                        </button>
                        
                        {showFeedback === 'wrong' && (
                        <span className="text-rose-600 font-bold flex items-center bg-rose-50 px-3 py-1 rounded border border-rose-200">
                            <ShieldAlert className="w-5 h-5 mr-2" /> Incorrect. Try adjusting the numbers!
                        </span>
                        )}

                        {showFeedback === 'correct' && (
                        <span className="text-emerald-600 font-bold flex items-center bg-emerald-50 px-3 py-1 rounded border border-emerald-200">
                            <CheckCircle className="w-5 h-5 mr-2" /> Balanced perfectly!
                        </span>
                        )}
                    </div>

                    <div className="bg-slate-50 border border-slate-200 p-4 rounded-lg mt-2">
                        <button 
                            onClick={getInlineHint} 
                            disabled={agentLoading}
                            className="text-indigo-600 hover:text-indigo-800 font-medium flex items-center bg-white border border-indigo-200 shadow-sm px-4 py-2 rounded transition disabled:opacity-50"
                        >
                            <MessageCircle className="w-5 h-5 mr-2" /> 
                            {agentLoading ? "AI is thinking..." : "AI Pedagogical Agent"}
                        </button>
                        
                        {currentHint && (
                        <div className="mt-4 p-4 bg-indigo-100 text-indigo-900 rounded border border-indigo-200 text-sm leading-relaxed">
                            <strong>Agent says:</strong> {currentHint}
                        </div>
                        )}
                    </div>
                    </div>

                    <div className="flex flex-col sm:flex-row items-center justify-end gap-4 border-t pt-4">
                    {showFeedback === 'correct' && (
                        <button onClick={handleNextEquation} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-6 rounded shadow flex items-center transition">
                        <CheckCircle className="w-5 h-5 mr-2" /> Next Mission
                        </button>
                    )}

                    {(progress.equationsCompleted || []).every(v => v === true) && eqIndex === EQUATIONS.length - 1 && showFeedback === 'correct' && (
                        <button onClick={() => setActiveTab('exit')} className="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-2 px-6 rounded shadow flex items-center transition">
                        Unlock Final Mission <Lock className="w-4 h-4 ml-2" />
                        </button>
                    )}
                    </div>
                </div>
                );
            };

            const renderTeacherVault = () => {
                return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-center mb-6">
                    <h2 className="text-2xl font-bold text-slate-800 flex items-center">
                        <UsersIcon className="mr-2 text-indigo-500 w-6 h-6" /> Teacher's Vault
                    </h2>
                    <button onClick={loadTeacherVault} className="bg-indigo-100 text-indigo-700 px-4 py-2 rounded font-bold hover:bg-indigo-200 transition">
                        Refresh Data
                    </button>
                    </div>
                    
                    <p className="text-slate-600 mb-6">View real-time correct and incorrect attempts from your students.</p>

                    {teacherLoading ? (
                    <div className="text-center py-10 text-slate-500">Loading student attempts...</div>
                    ) : studentAttempts.length === 0 ? (
                    <div className="text-center py-10 bg-slate-50 rounded border text-slate-500">No attempts logged yet. Check back once a student tries an equation!</div>
                    ) : (
                    <div className="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                        {studentAttempts.map(attempt => (
                        <div key={attempt.id} className={`p-4 border rounded-lg flex flex-col md:flex-row justify-between items-start md:items-center ${attempt.isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                            <div>
                            <div className="text-xs text-slate-500 mb-1">
                                Student: <span className="font-semibold text-indigo-600">{attempt.studentName || attempt.userId.substring(0, 8)}</span> | Time: {new Date(attempt.timestamp).toLocaleTimeString()}
                            </div>
                            <div className="font-bold text-slate-800">{attempt.equationTitle}</div>
                            <div className="text-sm font-mono mt-1 text-slate-600">
                                Left Coeffs: [{attempt.coeffs.left.join(', ')}] | Right Coeffs: [{attempt.coeffs.right.join(', ')}]
                            </div>
                            </div>
                            <div className={`mt-2 md:mt-0 px-3 py-1 rounded-full text-sm font-bold ${attempt.isCorrect ? 'bg-emerald-200 text-emerald-800' : 'bg-rose-200 text-rose-800'}`}>
                            {attempt.isCorrect ? 'Correct' : 'Incorrect'}
                            </div>
                        </div>
                        ))}
                    </div>
                    )}
                </div>
                );
            };

            const renderExitPass = () => {
                const handleCoeff = (side, i, val) => {
                    const v = val === '' ? '' : Math.max(1, parseInt(val));
                    setExitPassData(prev => {
                    const newSide = [...prev.coeffs[side]];
                    newSide[i] = v;
                    return { ...prev, coeffs: { ...prev.coeffs, [side]: newSide } };
                    });
                }

                const submitExitPass = async () => {
                const newProgress = { ...progress, exitPassCompleted: true };
                saveProgress(newProgress);
                
                if (user && db) {
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'chemistry_exit_pass', 'final'), {
                            studentName: studentName || "Anonymous Chemist",
                            explanation: exitPassData.explanation,
                            finalEquationCoeffs: exitPassData.coeffs,
                            timestamp: new Date()
                        });
                    } catch (error) {
                        handleDbError(error);
                    }
                }
                };

                if (progress.exitPassCompleted) {
                    return (
                        <div className="bg-emerald-50 border-2 border-emerald-500 p-10 rounded-xl text-center shadow-lg">
                            <Award className="w-20 h-20 text-emerald-500 mx-auto mb-4" />
                            <h2 className="text-3xl font-bold text-emerald-800 mb-2">Master Chemist!</h2>
                            <p className="text-emerald-700 text-lg">You have successfully completed the Balancing Equations module. Your results have been saved to your learning profile.</p>
                        </div>
                    )
                }

                return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                        <Lock className="mr-2 text-rose-500 w-6 h-6" /> Final Mission: The Exit Pass
                    </h2>
                    
                    <div className="space-y-8">
                        <div>
                        <label className="block text-slate-700 font-bold mb-2">1. Concept Check: Explain in your own words why we MUST balance chemical equations, and why we are NOT allowed to change the small subscript numbers.</label>
                        <textarea 
                            rows="4"
                            className="w-full border border-slate-300 rounded p-3 focus:ring focus:ring-indigo-200 outline-none"
                            placeholder="Type your explanation here..."
                            value={exitPassData.explanation}
                            onChange={(e) => setExitPassData({...exitPassData, explanation: e.target.value})}
                        ></textarea>
                        </div>

                        <div className="bg-slate-50 p-6 rounded border border-slate-200">
                        <label className="block text-slate-700 font-bold mb-4">2. The Boss Battle: Cellular Respiration</label>
                        <div className="flex flex-wrap items-center gap-3">
                            <input type="number" className="w-16 border rounded p-2 text-center" value={exitPassData.coeffs.left[0]} onChange={e => handleCoeff('left', 0, e.target.value)} /> <span className="text-xl font-bold">C₆H₁₂O₆</span>
                            <span className="text-xl font-bold text-slate-400">+</span>
                            <input type="number" className="w-16 border rounded p-2 text-center" value={exitPassData.coeffs.left[1]} onChange={e => handleCoeff('left', 1, e.target.value)} /> <span className="text-xl font-bold">O₂</span>
                            <ArrowRight className="text-indigo-500 w-6 h-6 mx-2" />
                            <input type="number" className="w-16 border rounded p-2 text-center" value={exitPassData.coeffs.right[0]} onChange={e => handleCoeff('right', 0, e.target.value)} /> <span className="text-xl font-bold">CO₂</span>
                            <span className="text-xl font-bold text-slate-400">+</span>
                            <input type="number" className="w-16 border rounded p-2 text-center" value={exitPassData.coeffs.right[1]} onChange={e => handleCoeff('right', 1, e.target.value)} /> <span className="text-xl font-bold">H₂O</span>
                        </div>
                        </div>

                        <button 
                            disabled={!exitPassData.explanation || exitPassData.explanation.length < 10}
                            onClick={submitExitPass} 
                            className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-lg shadow disabled:opacity-50 disabled:cursor-not-allowed transition">
                            Submit Exit Pass & Save Progress
                        </button>
                    </div>
                </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col font-sans">
                <header className="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-10">
                    <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                        <h1 className="text-xl font-bold flex items-center">
                            <FlaskConical className="mr-2 w-6 h-6" /> Chemistry Lab
                            {studentName && activeTab !== 'login' && <span className="ml-4 text-sm font-normal bg-indigo-800 px-3 py-1 rounded-full text-indigo-100">Welcome, {studentName}</span>}
                        </h1>
                        
                        {activeTab !== 'login' && (
                            <div className="flex flex-wrap gap-2 justify-center mt-2 md:mt-0">
                                <button onClick={() => setActiveTab('analogy')} className={`px-3 py-1 rounded text-sm font-medium ${activeTab === 'analogy' ? 'bg-white text-indigo-700' : 'hover:bg-indigo-600'}`}>1. Warm-up</button>
                                <button disabled={!progress.analogy} onClick={() => setActiveTab('rules')} className={`px-3 py-1 rounded text-sm font-medium disabled:opacity-50 ${activeTab === 'rules' ? 'bg-white text-indigo-700' : 'hover:bg-indigo-600'}`}>2. Rules</button>
                                <button disabled={!progress.rulesRead} onClick={() => setActiveTab('practice')} className={`px-3 py-1 rounded text-sm font-medium disabled:opacity-50 ${activeTab === 'practice' ? 'bg-white text-indigo-700' : 'hover:bg-indigo-600'}`}>3. Practice</button>
                                <button disabled={!(progress.equationsCompleted || []).every(v=>v)} onClick={() => setActiveTab('exit')} className={`px-3 py-1 rounded text-sm font-medium disabled:opacity-50 ${activeTab === 'exit' ? 'bg-white text-indigo-700' : 'hover:bg-indigo-600'}`}>4. Exit Pass</button>
                                
                                <div className="w-px h-6 bg-indigo-500 mx-2 hidden sm:block"></div>
                                
                                <button onClick={() => { setActiveTab('teacher'); loadTeacherVault(); }} className={`px-3 py-1 rounded text-sm font-medium flex items-center ${activeTab === 'teacher' ? 'bg-amber-400 text-amber-900' : 'bg-indigo-900 text-indigo-200 hover:bg-indigo-800'}`}>
                                <Lock className="w-4 h-4 mr-1" /> Teacher Vault
                                </button>
                            </div>
                        )}
                    </div>
                </header>
                
                {/* Firebase Error Banner */}
                {dbError && (
                    <div className="bg-rose-500 text-white px-4 py-4 text-center shadow-md border-b-4 border-rose-700 z-20 relative">
                        <div className="flex justify-center items-center font-bold mb-3 text-base">
                            <ShieldAlert className="w-6 h-6 mr-2 flex-shrink-0" />
                            <span>{dbError.title}</span>
                        </div>
                        {dbError.details && (
                            <div className="bg-rose-950 bg-opacity-60 p-4 rounded text-left font-mono text-sm mx-auto max-w-3xl whitespace-pre-wrap overflow-x-auto shadow-inner border border-rose-400">
                                {dbError.details}
                            </div>
                        )}
                    </div>
                )}

                <main className="flex-grow max-w-4xl w-full mx-auto p-4 md:p-8 relative">
                    {activeTab === 'login' && renderLogin()}
                    {activeTab === 'analogy' && renderAnalogy()}
                    {activeTab === 'rules' && renderRules()}
                    {activeTab === 'practice' && renderPractice()}
                    {activeTab === 'exit' && renderExitPass()}
                    {activeTab === 'teacher' && renderTeacherVault()}
                </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

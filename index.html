<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemistry Balancer</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          keyframes: {
            shake: {
              '0%, 100%': { transform: 'translateX(0)' },
              '25%': { transform: 'translateX(-5px)' },
              '75%': { transform: 'translateX(5px)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          },
          animation: {
            shake: 'shake 0.3s ease-in-out',
            'fade-in': 'fadeIn 0.5s ease-out',
          }
        }
      }
    }
  </script>

  <!-- Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map for React and Firebase -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, addDoc, onSnapshot } from 'firebase/firestore';

    // ==========================================
    // INLINE SVG ICONS (Replaces lucide-react for standalone HTML)
    // ==========================================
    const Beaker = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>;
    const ShieldAlert = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>;
    const GraduationCap = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
    const CheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const XCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
    const ArrowRight = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
    const Activity = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
    const Users = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const AlertTriangle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    const Lightbulb = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
    const Lock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const BookOpen = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;

    // ==========================================
    // 1. FIREBASE SETUP
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDRO8liDHigDRzV0jpHn3c4SmDlC-l3qLc",
      authDomain: "chem-detective-2026.firebaseapp.com",
      projectId: "chem-detective-2026",
      storageBucket: "chem-detective-2026.firebasestorage.app",
      messagingSenderId: "477655926627",
      appId: "1:477655926627:web:2a7d12a0163b54af5ab556"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const PROJECT_APP_ID = 'chemistry-balancer-app'; // Used for the Firestore path

    // ==========================================
    // 2. PEDAGOGICAL DATA
    // ==========================================
    const EQUATIONS = [
      {
        id: 'eq1',
        difficulty: 'Level 1: The Warm-up',
        rule: 'Direct Inspection (Left to Right)',
        description: 'Let\'s start simple. Balance the Hydrogen and Chlorine.',
        reactants: [{ formula: 'H₂', atoms: { H: 2 } }, { formula: 'Cl₂', atoms: { Cl: 2 } }],
        products: [{ formula: 'HCl', atoms: { H: 1, Cl: 1 } }],
        elements: ['H', 'Cl'],
        correct: [1, 1, 2],
        scaffold: [
          "Look at the left side: You have 2 H atoms and 2 Cl atoms.",
          "Look at the right side: You only have 1 H and 1 Cl in each HCl molecule.",
          "What number can you place in front of HCl to double both the H and Cl?"
        ]
      },
      {
        id: 'eq2',
        difficulty: 'Level 2: The classic Ammonia',
        rule: 'Balance one element at a time',
        description: 'When elements are combined differently, focus on balancing one specific element completely before moving to the next.',
        reactants: [{ formula: 'N₂', atoms: { N: 2 } }, { formula: 'H₂', atoms: { H: 2 } }],
        products: [{ formula: 'NH₃', atoms: { N: 1, H: 3 } }],
        elements: ['N', 'H'],
        correct: [1, 3, 2],
        scaffold: [
          "Step 1: Balance Nitrogen (N) first. Place a 2 in front of NH₃ to get 2 N atoms on the right.",
          "Step 2: Now look at Hydrogen (H). 2 NH₃ molecules means you have 2 × 3 = 6 H atoms on the right.",
          "Step 3: What coefficient do you need for H₂ on the left to get 6 H atoms?"
        ]
      },
      {
        id: 'eq3',
        difficulty: 'Level 3: Back and Forth',
        rule: 'The Ripple Effect (Adjusting previously balanced elements)',
        description: 'Sometimes balancing one element unbalances another. Don\'t panic, just go back and adjust!',
        reactants: [{ formula: 'Mg', atoms: { Mg: 1 } }, { formula: 'O₂', atoms: { O: 2 } }],
        products: [{ formula: 'MgO', atoms: { Mg: 1, O: 1 } }],
        elements: ['Mg', 'O'],
        correct: [2, 1, 2],
        scaffold: [
          "Step 1: Balance Oxygen (O) first. Put a 2 in front of MgO.",
          "Step 2: Notice that placing a 2 in front of MgO also changed your Mg count to 2 on the right!",
          "Step 3: Go back to the left side and adjust the Mg coefficient."
        ]
      },
      {
        id: 'eq4',
        difficulty: 'Level 4: Basic Combustion',
        rule: 'Balance free-standing elements last',
        description: 'A golden rule of thumb: If an element appears by itself (like O₂, Mg, H₂), leave it for the very end!',
        reactants: [{ formula: 'CH₄', atoms: { C: 1, H: 4 } }, { formula: 'O₂', atoms: { O: 2 } }],
        products: [{ formula: 'CO₂', atoms: { C: 1, O: 2 } }, { formula: 'H₂O', atoms: { H: 2, O: 1 } }],
        elements: ['C', 'H', 'O'],
        correct: [1, 2, 1, 2],
        scaffold: [
          "Step 1: Carbon is already balanced (1 on each side). Leave it for now.",
          "Step 2: Balance Hydrogen. You have 4 on the left and 2 on the right. Put a 2 in front of H₂O.",
          "Step 3: Count total Oxygen on the right: 2 (from CO₂) + 2 (from 2H₂O) = 4 total O.",
          "Step 4: Now balance O₂ on the left to get 4 Oxygen atoms."
        ]
      },
      {
        id: 'eq5',
        difficulty: 'Level 5: The Odd-Even Rule',
        rule: 'Find the Lowest Common Multiple (LCM)',
        description: 'When you have an odd number of atoms on one side and an even number on the other, multiply to find their LCM.',
        reactants: [{ formula: 'Fe', atoms: { Fe: 1 } }, { formula: 'O₂', atoms: { O: 2 } }],
        products: [{ formula: 'Fe₂O₃', atoms: { Fe: 2, O: 3 } }],
        elements: ['Fe', 'O'],
        correct: [4, 3, 2],
        scaffold: [
          "Step 1: Look at Oxygen. Left has 2 (even), Right has 3 (odd).",
          "Step 2: Find the Lowest Common Multiple of 2 and 3, which is 6.",
          "Step 3: Make both sides have 6 Oxygen atoms. Multiply O₂ by 3, and Fe₂O₃ by 2.",
          "Step 4: Finally, balance the Fe atoms on the left."
        ]
      },
      {
        id: 'eq6',
        difficulty: 'Level 6: Polyatomic Mastery',
        rule: 'Treat polyatomic ions as single groups',
        description: 'Pro-tip: If a polyatomic ion (like NO₃ or OH) appears exactly the same on both sides, balance it as a whole block!',
        reactants: [{ formula: 'Al(NO₃)₃', atoms: { Al: 1, NO3: 3 } }, { formula: 'NaOH', atoms: { Na: 1, OH: 1 } }],
        products: [{ formula: 'Al(OH)₃', atoms: { Al: 1, OH: 3 } }, { formula: 'NaNO₃', atoms: { Na: 1, NO3: 1 } }],
        elements: ['Al', 'NO3', 'Na', 'OH'],
        correct: [1, 3, 1, 3],
        scaffold: [
          "Step 1: Treat (NO₃) as one block. You have 3 (NO₃) groups on the left, so put a 3 in front of NaNO₃ on the right.",
          "Step 2: Now you have 3 Na atoms on the right. Put a 3 in front of NaOH on the left to balance Na.",
          "Step 3: Check your (OH) groups. You now have 3 (OH) on the left, which perfectly matches the 3 (OH) in Al(OH)₃ on the right!",
          "Step 4: Check Al. 1 on left, 1 on right. It is balanced!"
        ]
      }
    ];

    // ==========================================
    // 3. MAIN APPLICATION
    // ==========================================
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('login');
      const [previousView, setPreviousView] = useState('login');
      const [studentName, setStudentName] = useState('');
      const [classCode, setClassCode] = useState('');
      const [attemptsData, setAttemptsData] = useState([]);

      const goToVaultLogin = (currentView) => {
        setPreviousView(currentView);
        setView('vault_login');
      };

      const exitVault = () => setView(previousView);

      // GitHub Pages uses Anonymous Auth
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Auth error:", err);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const attemptsRef = collection(db, 'artifacts', PROJECT_APP_ID, 'public', 'data', 'attempts');
        const unsubscribe = onSnapshot(attemptsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAttemptsData(data);
        }, (error) => {
          console.error("Error fetching attempts:", error);
        });
        return () => unsubscribe();
      }, [user]);

      if (view === 'login') return <LoginScreen setView={setView} studentName={studentName} setStudentName={setStudentName} classCode={classCode} setClassCode={setClassCode} onGoToVault={() => goToVaultLogin('login')} />;
      if (view === 'student') return <StudentApp studentName={studentName} classCode={classCode} setView={setView} user={user} db={db} onGoToVault={() => goToVaultLogin('student')} PROJECT_APP_ID={PROJECT_APP_ID} />;
      if (view === 'vault_login') return <VaultLoginScreen setView={setView} classCode={classCode} setClassCode={setClassCode} exitVault={exitVault} />;
      if (view === 'teacher') return <TeacherVault attempts={attemptsData} classCode={classCode} exitVault={exitVault} />;
      
      return null;
    }

    // ==========================================
    // SCREENS
    // ==========================================
    function LoginScreen({ setView, studentName, setStudentName, classCode, setClassCode, onGoToVault }) {
      const isFormValid = studentName.trim() && classCode.trim();
      return (
        <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-8 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
            <div className="text-center">
              <div className="mx-auto bg-indigo-100 w-16 h-16 flex items-center justify-center rounded-full mb-4">
                <Beaker className="w-8 h-8 text-indigo-600" />
              </div>
              <h1 className="text-2xl font-bold text-slate-800">Chemistry Balancer</h1>
              <p className="text-slate-500 mt-2">Sec 3 G2 Combined Science</p>
            </div>
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Class Code</label>
                <input type="text" value={classCode} onChange={(e) => setClassCode(e.target.value.toUpperCase())} placeholder="e.g. 3G2-CHEM" className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none uppercase" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Student Name</label>
                <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="e.g. John Doe" className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none" onKeyDown={(e) => { if(e.key === 'Enter' && isFormValid) setView('student') }} />
              </div>
              <button onClick={() => setView('student')} disabled={!isFormValid} className="w-full mt-4 bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed">Start Practice</button>
            </div>
            <div className="pt-6 border-t border-slate-100 text-center">
              <button onClick={onGoToVault} className="text-sm text-slate-500 hover:text-indigo-600 flex items-center justify-center w-full gap-2 transition-colors">
                <ShieldAlert className="w-4 h-4" /> Teacher Access
              </button>
            </div>
          </div>
        </div>
      );
    }

    function VaultLoginScreen({ setView, classCode, setClassCode, exitVault }) {
      const [pin, setPin] = useState('');
      const [tempClassCode, setTempClassCode] = useState(classCode);
      const [error, setError] = useState(false);

      const handleLogin = () => {
        if (pin === '0000' && tempClassCode.trim() !== '') {
          setClassCode(tempClassCode.trim().toUpperCase());
          setView('teacher');
        } else {
          setError(true);
          setPin('');
        }
      };

      return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4">
          <div className="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-8 space-y-8 border border-slate-700">
            <div className="text-center">
              <div className="mx-auto bg-slate-700 w-16 h-16 flex items-center justify-center rounded-full mb-4 shadow-inner">
                <Lock className="w-8 h-8 text-amber-400" />
              </div>
              <h1 className="text-2xl font-bold text-white">Teacher's Vault</h1>
              <p className="text-slate-400 mt-2">Secure access required</p>
            </div>
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-300 mb-1">Target Class Code</label>
                <input type="text" value={tempClassCode} onChange={(e) => setTempClassCode(e.target.value.toUpperCase())} placeholder="e.g. 3G2-CHEM" className="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white focus:ring-2 focus:ring-amber-500 outline-none uppercase placeholder-slate-500" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-300 mb-1">Vault PIN</label>
                <input type="password" value={pin} onChange={(e) => { setPin(e.target.value); setError(false); }} placeholder="****" maxLength={4} className={`w-full px-4 py-3 rounded-lg bg-slate-700 border text-center tracking-widest text-xl font-mono text-white outline-none placeholder-slate-500 ${error ? 'border-red-500 ring-2 ring-red-500/50' : 'border-slate-600 focus:ring-2 focus:ring-amber-500'}`} onKeyDown={(e) => { if(e.key === 'Enter') handleLogin() }} />
                {error && <p className="text-red-400 text-sm mt-2 text-center animate-shake">Incorrect PIN or missing Class Code.</p>}
              </div>
              <div className="flex gap-3 pt-4">
                <button onClick={exitVault} className="w-1/3 bg-slate-700 text-slate-300 font-semibold py-3 rounded-lg hover:bg-slate-600 transition-colors">Cancel</button>
                <button onClick={handleLogin} disabled={!pin || !tempClassCode} className="w-2/3 bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-400 disabled:opacity-50 disabled:cursor-not-allowed">Unlock Vault</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function StudentApp({ studentName, classCode, setView, user, db, onGoToVault, PROJECT_APP_ID }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [inputs, setInputs] = useState([]);
      const [showHint, setShowHint] = useState(0); 
      const [feedback, setFeedback] = useState(null); 
      const [isSubmitting, setIsSubmitting] = useState(false);

      const equation = EQUATIONS[currentIndex];
      const totalTerms = equation ? equation.reactants.length + equation.products.length : 0;

      useEffect(() => {
        if (totalTerms > 0) {
          setInputs(Array(totalTerms).fill(""));
          setShowHint(0);
          setFeedback(null);
        }
      }, [currentIndex, totalTerms]);

      const handleInputChange = (index, value) => {
        if (value === '' || /^[1-9]\d*$/.test(value)) {
          const newInputs = [...inputs];
          newInputs[index] = value;
          setInputs(newInputs);
          setFeedback(null);
        }
      };

      const checkAnswer = async () => {
        setIsSubmitting(true);
        const userCoeffs = inputs.map(val => val === "" ? 0 : parseInt(val, 10));
        
        if (userCoeffs.includes(0)) {
          setFeedback('missing');
          setIsSubmitting(false);
          return;
        }

        const isCorrect = userCoeffs.every((val, idx) => val === equation.correct[idx]);
        
        if (user && db) {
          try {
            const attemptsRef = collection(db, 'artifacts', PROJECT_APP_ID, 'public', 'data', 'attempts');
            await addDoc(attemptsRef, {
              studentName: studentName.trim(),
              classCode: classCode.trim().toUpperCase(),
              questionId: equation.id,
              isCorrect: isCorrect,
              inputs: userCoeffs,
              timestamp: new Date().toISOString()
            });
          } catch (err) {
            console.error("Failed to save attempt:", err);
          }
        }

        if (isCorrect) {
          setFeedback('correct');
        } else {
          setFeedback('incorrect');
          if (showHint < equation.scaffold.length) setShowHint(prev => prev + 1);
        }
        setIsSubmitting(false);
      };

      const nextQuestion = () => {
        if (currentIndex < EQUATIONS.length - 1) setCurrentIndex(prev => prev + 1);
        else setFeedback('completed');
      };

      if (feedback === 'completed') {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center py-10 px-4">
            <div className="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-8 space-y-8 animate-fade-in">
              <div className="text-center space-y-4">
                <div className="mx-auto bg-green-100 w-24 h-24 flex items-center justify-center rounded-full mb-4">
                  <GraduationCap className="w-12 h-12 text-green-600" />
                </div>
                <h2 className="text-3xl font-bold text-slate-800">Excellent Work, {studentName}!</h2>
                <p className="text-slate-600">You have successfully navigated all 6 levels of balancing equations.</p>
              </div>
              <div className="bg-indigo-50 rounded-xl p-6 border border-indigo-100">
                <h3 className="font-bold text-indigo-900 text-lg mb-4 flex items-center gap-2">
                  <BookOpen className="w-5 h-5" /> Summary of Rules Mastered
                </h3>
                <ul className="space-y-4">
                  {EQUATIONS.map((eq, idx) => (
                    <li key={idx} className="flex gap-4 items-start bg-white p-4 rounded-lg shadow-sm">
                      <div className="bg-indigo-100 text-indigo-700 font-bold w-8 h-8 flex items-center justify-center rounded-full shrink-0">{idx + 1}</div>
                      <div>
                        <h4 className="font-bold text-slate-800">{eq.rule}</h4>
                        <p className="text-sm text-slate-600 mt-1">{eq.description}</p>
                      </div>
                    </li>
                  ))}
                </ul>
              </div>
              <div className="flex flex-col sm:flex-row gap-4 pt-4 border-t border-slate-100">
                <button onClick={() => setView('login')} className="flex-1 bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700 shadow-md">Return to Login</button>
                <button onClick={onGoToVault} className="flex-1 flex items-center justify-center gap-2 bg-slate-100 text-slate-700 hover:bg-slate-200 font-semibold py-3 rounded-lg shadow-sm">
                  <Lock className="w-4 h-4" /> Teacher Vault
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 pb-10">
          <header className="bg-white shadow-sm px-6 py-4 flex items-center justify-between sticky top-0 z-10">
            <div className="flex items-center gap-3">
              <Beaker className="text-indigo-600 w-6 h-6" />
              <h1 className="font-bold text-lg hidden sm:block">ChemBalancer</h1>
              <span className="hidden sm:inline-block px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-xs font-mono uppercase tracking-wider">Class: {classCode}</span>
            </div>
            <div className="text-sm font-medium bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full hidden sm:block">Student: {studentName}</div>
            <div className="flex items-center gap-4 sm:gap-6">
              <button onClick={onGoToVault} className="text-sm text-slate-500 hover:text-amber-600 flex items-center gap-1 transition-colors">
                <Lock className="w-4 h-4" /> <span className="hidden sm:inline">Teacher Vault</span>
              </button>
              <button onClick={() => setView('login')} className="text-sm text-slate-500 hover:text-slate-800 transition-colors border-l pl-4 border-slate-200">Exit</button>
            </div>
          </header>

          <main className="max-w-4xl mx-auto p-4 sm:p-6 space-y-6 mt-4">
            <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
              <div className="flex justify-between items-end mb-4">
                <div>
                  <p className="text-sm font-bold text-indigo-500 tracking-wider uppercase mb-1">Question {currentIndex + 1} of {EQUATIONS.length}</p>
                  <h2 className="text-2xl font-bold text-slate-800">{equation.difficulty}</h2>
                </div>
                <div className="text-right hidden sm:block">
                  <span className="text-sm text-slate-500">Progress</span>
                  <div className="w-32 h-2 bg-slate-100 rounded-full mt-1 overflow-hidden">
                    <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${((currentIndex) / EQUATIONS.length) * 100}%` }} />
                  </div>
                </div>
              </div>
              <div className="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100 mb-4">
                <h3 className="text-indigo-800 font-bold flex items-center gap-2 mb-1">
                  <Lightbulb className="w-4 h-4" /> Rule Focus: {equation.rule}
                </h3>
                <p className="text-slate-600 text-sm">{equation.description}</p>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm p-6 sm:p-10 border border-slate-100 text-center overflow-x-auto">
              <div className="flex items-center justify-center gap-2 sm:gap-4 flex-wrap text-2xl sm:text-3xl font-medium min-w-max">
                {equation.reactants.map((reactant, idx) => (
                  <React.Fragment key={`r-${idx}`}>
                    <div className="flex items-center gap-2">
                      <input type="text" value={inputs[idx] ?? ""} onChange={(e) => handleInputChange(idx, e.target.value)} className="w-12 h-14 sm:w-16 sm:h-16 text-center border-2 border-indigo-200 rounded-xl focus:border-indigo-600 outline-none text-indigo-700 bg-indigo-50/30" placeholder="?" maxLength={2} />
                      <span>{formatFormula(reactant.formula)}</span>
                    </div>
                    {idx < equation.reactants.length - 1 && <span className="text-slate-400 mx-2">+</span>}
                  </React.Fragment>
                ))}
                <span className="text-slate-400 mx-4">→</span>
                {equation.products.map((product, idx) => {
                  const globalIdx = equation.reactants.length + idx;
                  return (
                    <React.Fragment key={`p-${idx}`}>
                      <div className="flex items-center gap-2">
                        <input type="text" value={inputs[globalIdx] ?? ""} onChange={(e) => handleInputChange(globalIdx, e.target.value)} className="w-12 h-14 sm:w-16 sm:h-16 text-center border-2 border-emerald-200 rounded-xl focus:border-emerald-600 outline-none text-emerald-700 bg-emerald-50/30" placeholder="?" maxLength={2} />
                        <span>{formatFormula(product.formula)}</span>
                      </div>
                      {idx < equation.products.length - 1 && <span className="text-slate-400 mx-2">+</span>}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>

            <AtomCounter equation={equation} inputs={inputs} />

            {showHint > 0 && (
              <div className="bg-amber-50 rounded-2xl p-6 border border-amber-200 animate-fade-in">
                <div className="flex items-center gap-2 mb-3 text-amber-800 font-bold">
                  <Lightbulb className="w-5 h-5" /> <h3>Teacher's Hints</h3>
                </div>
                <ul className="space-y-3">
                  {equation.scaffold.slice(0, showHint).map((hint, idx) => (
                    <li key={idx} className="flex gap-3 text-amber-900 bg-amber-100/50 p-3 rounded-lg text-sm sm:text-base">
                      <span className="font-bold shrink-0">{idx + 1}.</span> <span>{hint}</span>
                    </li>
                  ))}
                </ul>
              </div>
            )}

            <div className="flex flex-col sm:flex-row items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
              <div className="flex-1">
                 {feedback === 'missing' && <div className="flex items-center gap-2 text-amber-600 font-medium"><AlertTriangle className="w-5 h-5" /> Please enter a number in all boxes.</div>}
                {feedback === 'incorrect' && <div className="flex items-center gap-2 text-red-500 font-medium animate-shake"><XCircle className="w-5 h-5" /> Not quite balanced yet. Check the counts!</div>}
                {feedback === 'correct' && <div className="flex items-center gap-2 text-green-600 font-bold text-lg"><CheckCircle className="w-6 h-6" /> Perfectly Balanced!</div>}
              </div>
              <div>
                {feedback !== 'correct' ? (
                  <button onClick={checkAnswer} disabled={isSubmitting} className="w-full sm:w-auto px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl disabled:opacity-70">{isSubmitting ? 'Checking...' : 'Check Answer'}</button>
                ) : (
                  <button onClick={nextQuestion} className="w-full sm:w-auto flex items-center justify-center gap-2 px-8 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl animate-pulse">Next Question <ArrowRight className="w-5 h-5" /></button>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    function AtomCounter({ equation, inputs }) {
      const calculateAtoms = (parts, inputStartIndex) => {
        let totals = {};
        equation.elements.forEach(el => totals[el] = 0);
        parts.forEach((part, idx) => {
          const coeff = inputs[inputStartIndex + idx] === "" ? 0 : parseInt(inputs[inputStartIndex + idx], 10);
          if (coeff > 0) Object.keys(part.atoms).forEach(el => totals[el] += (part.atoms[el] * coeff));
        });
        return totals;
      };

      const leftAtoms = calculateAtoms(equation.reactants, 0);
      const rightAtoms = calculateAtoms(equation.products, equation.reactants.length);

      return (
        <div className="bg-slate-800 rounded-2xl p-6 shadow-md text-white overflow-hidden relative">
          <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
          <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-100">
            <Activity className="w-5 h-5 text-indigo-400" /> Live Atom Counter
          </h3>
          <div className="overflow-x-auto">
            <table className="w-full text-left border-collapse min-w-[300px]">
              <thead>
                <tr className="border-b border-slate-700 text-slate-400 text-sm">
                  <th className="pb-3 px-2">Element/Group</th>
                  <th className="pb-3 px-2 text-center">Reactants (Left)</th>
                  <th className="pb-3 px-2 text-center">Products (Right)</th>
                  <th className="pb-3 px-2 text-center">Status</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-700">
                {equation.elements.map(el => {
                  const leftCount = leftAtoms[el];
                  const rightCount = rightAtoms[el];
                  const isBalanced = leftCount > 0 && leftCount === rightCount;
                  const hasInput = leftCount > 0 || rightCount > 0;
                  return (
                    <tr key={el} className="hover:bg-slate-700/30 transition-colors">
                      <td className="py-3 px-2 font-bold text-indigo-300">{formatFormula(el)}</td>
                      <td className="py-3 px-2 text-center font-mono text-lg">{leftCount || '-'}</td>
                      <td className="py-3 px-2 text-center font-mono text-lg">{rightCount || '-'}</td>
                      <td className="py-3 px-2 text-center">
                        {hasInput ? (isBalanced ? <span className="inline-flex bg-green-500/20 text-green-400 rounded-full w-8 h-8 items-center justify-center"><CheckCircle className="w-5 h-5" /></span> : <span className="inline-flex bg-red-500/20 text-red-400 rounded-full w-8 h-8 items-center justify-center animate-pulse"><XCircle className="w-5 h-5" /></span>) : <span className="text-slate-600">-</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function TeacherVault({ attempts, classCode, exitVault }) {
      const analytics = useMemo(() => {
        const classAttempts = attempts.filter(a => a.classCode === classCode);
        let studentStats = {};
        let questionStats = {};
        EQUATIONS.forEach(eq => questionStats[eq.id] = { id: eq.id, title: eq.difficulty, rule: eq.rule, total: 0, correct: 0, incorrect: 0 });

        classAttempts.forEach(attempt => {
          const { studentName, questionId, isCorrect } = attempt;
          if (!studentStats[studentName]) studentStats[studentName] = { name: studentName, total: 0, correct: 0, incorrect: 0 };
          studentStats[studentName].total++;
          if (isCorrect) studentStats[studentName].correct++; else studentStats[studentName].incorrect++;
          if (questionStats[questionId]) {
            questionStats[questionId].total++;
            if (isCorrect) questionStats[questionId].correct++; else questionStats[questionId].incorrect++;
          }
        });

        const processStats = (obj) => Object.values(obj).map(item => ({ ...item, successRate: item.total > 0 ? Math.round((item.correct / item.total) * 100) : 0 }));
        return { students: processStats(studentStats).sort((a,b) => a.successRate - b.successRate), questions: processStats(questionStats).sort((a,b) => a.successRate - b.successRate), totalAttempts: classAttempts.length };
      }, [attempts, classCode]);

      const studentsNeedingHelp = analytics.students.filter(s => s.successRate < 60 && s.total > 3);
      const hardQuestions = analytics.questions.filter(q => q.successRate < 60 && q.total > 0);

      return (
        <div className="min-h-screen bg-slate-100 pb-10">
          <header className="bg-slate-900 text-white px-6 py-4 flex items-center justify-between shadow-md sticky top-0 z-10">
            <div className="flex items-center gap-3">
              <Lock className="text-amber-400 w-6 h-6" />
              <h1 className="font-bold text-lg hidden sm:block">Teacher's Pedagogical Vault</h1>
              <span className="bg-slate-700 px-3 py-1 rounded-md text-sm font-mono ml-2 border border-slate-600">CLASS: {classCode}</span>
            </div>
            <button onClick={exitVault} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-medium">Exit Vault</button>
          </header>
          <main className="max-w-6xl mx-auto p-4 sm:p-6 space-y-6">
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 className="text-slate-500 text-sm font-bold uppercase mb-1">Class Attempts</h3>
                <p className="text-4xl font-black text-slate-800">{analytics.totalAttempts}</p>
              </div>
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 className="text-slate-500 text-sm font-bold uppercase mb-1">Active Students</h3>
                <p className="text-4xl font-black text-indigo-600">{analytics.students.length}</p>
              </div>
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                 <h3 className="text-slate-500 text-sm font-bold uppercase mb-1">Avg Class Accuracy</h3>
                 <p className="text-4xl font-black text-emerald-600">{analytics.totalAttempts > 0 ? Math.round((analytics.students.reduce((acc, s) => acc + s.correct, 0) / analytics.totalAttempts) * 100) : 0}%</p>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="bg-amber-50 border-b border-amber-100 p-4 flex items-center gap-2 text-amber-800">
                  <AlertTriangle className="w-5 h-5" /> <h2 className="font-bold">Rules Needing Reteaching</h2>
                </div>
                <div className="p-0">
                  {hardQuestions.length > 0 ? (
                    <ul className="divide-y divide-slate-100">
                      {hardQuestions.map(q => (
                        <li key={q.id} className="p-4 flex justify-between items-center hover:bg-slate-50">
                          <div>
                            <p className="font-bold text-slate-800">{q.title}</p>
                            <p className="text-xs font-semibold text-indigo-600 mb-1">Rule: {q.rule}</p>
                            <p className="text-sm text-slate-500">{q.incorrect} wrong attempts</p>
                          </div>
                          <div className="text-right ml-4">
                            <span className={`px-3 py-1 rounded-full text-sm font-bold ${q.successRate < 40 ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`}>{q.successRate}% Success</span>
                          </div>
                        </li>
                      ))}
                    </ul>
                  ) : <div className="p-8 text-center text-slate-500"><CheckCircle className="w-8 h-8 mx-auto text-green-300 mb-2" /><p>No major bottlenecks identified.</p></div>}
                </div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="bg-rose-50 border-b border-rose-100 p-4 flex items-center gap-2 text-rose-800">
                  <Users className="w-5 h-5" /> <h2 className="font-bold">Students Needing Interventions</h2>
                </div>
                <div className="p-0">
                  {studentsNeedingHelp.length > 0 ? (
                    <ul className="divide-y divide-slate-100">
                      {studentsNeedingHelp.map(s => (
                        <li key={s.name} className="p-4 flex justify-between items-center hover:bg-slate-50">
                          <div><p className="font-bold text-slate-800">{s.name}</p><p className="text-sm text-rose-500">{s.incorrect} mistakes</p></div>
                          <div className="text-right"><span className="px-3 py-1 rounded-full text-sm font-bold bg-rose-100 text-rose-700">{s.successRate}% Accuracy</span></div>
                        </li>
                      ))}
                    </ul>
                  ) : <div className="p-8 text-center text-slate-500"><Users className="w-8 h-8 mx-auto text-slate-300 mb-2" /><p>Sufficient data pending or students are doing great.</p></div>}
                </div>
              </div>
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="p-4 border-b border-slate-100 bg-slate-50"><h2 className="font-bold text-slate-800">Full Class Roster Overview</h2></div>
              <div className="overflow-x-auto">
                <table className="w-full text-left">
                  <thead className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                    <tr><th className="p-4">Student Name</th><th className="p-4 text-center">Total Attempts</th><th className="p-4 text-center">Correct</th><th className="p-4 text-center">Mistakes</th><th className="p-4 text-right">Accuracy</th></tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {analytics.students.map((s) => (
                      <tr key={s.name} className="hover:bg-slate-50">
                        <td className="p-4 font-medium text-slate-800">{s.name}</td><td className="p-4 text-center text-slate-600">{s.total}</td>
                        <td className="p-4 text-center text-emerald-600 font-medium">{s.correct}</td><td className="p-4 text-center text-rose-500 font-medium">{s.incorrect}</td>
                        <td className="p-4 text-right"><span className={`font-bold ${s.successRate >= 75 ? 'text-emerald-600' : s.successRate >= 50 ? 'text-amber-500' : 'text-rose-600'}`}>{s.successRate}%</span></td>
                      </tr>
                    ))}
                    {analytics.students.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">No student data recorded yet.</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </main>
        </div>
      );
    }

    function formatFormula(formula) {
      const subscriptMap = { '0': '₀', '1': '₁', '2': '₂', '3': '₃', '4': '₄', '5': '₅', '6': '₆', '7': '₇', '8': '₈', '9': '₉' };
      return formula.replace(/[0-9]/g, match => subscriptMap[match]);
    }

    // Render the App
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
